<h1>Notifications</h1>

<div class="form-container">


  <input
    type="text"
    placeholder="Message"
    [(ngModel)]="notification.message"
  />

  <button (click)="saveNotification()">
    Ajouter
  </button>

</div>

<div
  class="notification-card"
  *ngFor="let notification of notifications"
>


  <p>{{ notification.message }}</p>

</div>
