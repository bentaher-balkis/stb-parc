<div class="register-container">

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-card">

    <h2>Inscription</h2>

    <!-- Username -->
    <div class="form-group">
      <input type="text" formControlName="username" placeholder="Username">

      <small class="error"
        *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.invalid">
        Username requis
      </small>
    </div>

    <!-- Email -->
    <div class="form-group">
      <input type="email" formControlName="email" placeholder="Email">

      <small class="error"
        *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
        Email invalide
      </small>
    </div>

    <!-- Password -->
    <div class="form-group">
      <input type="password" formControlName="password" placeholder="Password">

      <small class="error"
        *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
        Mot de passe requis (min 6 caractères)
      </small>
    </div>

    <!-- Button -->
    <button type="submit" [disabled]="registerForm.invalid">
      S'inscrire
    </button>

    <!-- Messages -->
    <p class="success" *ngIf="message">{{ message }}</p>
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <!-- Link to login -->
   
 <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
<p class="link-text">
  Déjà un compte ?
      <a routerLink="">Se connecter</a>
</p>
  </form>

</div>
