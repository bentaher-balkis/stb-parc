<h1>Transactions</h1>

<div class="form-container">

  <input
    type="number"
    placeholder="Amount"
    [(ngModel)]="transaction.amount"
  />

  <button (click)="saveTransaction()">
    Ajouter
  </button>

</div>

<table>

  <thead>

    <tr>

      <th>Amount</th>

      <th>Date</th>

    </tr>

  </thead>

  <tbody>

    <tr *ngFor="let transaction of transactions">

      <td>{{ transaction.amount }}</td>

      <td>{{ transaction.date }}</td>

    </tr>

  </tbody>

</table>
