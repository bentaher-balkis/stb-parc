
<h1>Statistiques Dashboard</h1>

<div class="stats-container">

  <div class="stat-card">
    <h2>Users</h2>
    <p>{{ usersCount }}</p>
  </div>

  <div class="stat-card">
    <h2>TPEs</h2>
    <p>{{ tpesCount }}</p>
  </div>

  <div class="stat-card">
    <h2>Transactions</h2>
    <p>{{ transactionsCount }}</p>
  </div>

  <div class="stat-card">
    <h2>Roles</h2>
    <p>{{ rolesCount }}</p>
  </div>

  <div class="stat-card">
    <h2>Notifications</h2>
    <p>{{ notificationsCount }}</p>
  </div>

</div>
